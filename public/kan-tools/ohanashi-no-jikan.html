<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>おはなしの時間</title>
  <style>
    :root {
      --fg: #4b5563;
      --fg-strong: #374151;
      --line: #d1d5db;
      --bg: #f9fafb;
      --card: #ffffff;
      --accent: #6b7280;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
    }
    .wrap {
      max-width: 880px;
      margin: 0 auto;
      padding: 24px 16px 56px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.6rem, 3.5vw, 2.1rem);
      color: var(--fg-strong);
      letter-spacing: 0.02em;
    }
    .lead {
      margin: 0 0 14px;
      font-size: 0.95rem;
    }
    .hint {
      margin: 0 0 14px;
      font-size: 0.82rem;
      color: #6b7280;
    }
    .strata {
      width: 100%;
      cursor: pointer;
      user-select: none;
      padding: 0;
      margin: 0 0 14px;
      overflow: auto;
      height: min(62vh, 460px);
      min-height: 300px;
    }
    .strata pre {
      margin: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, "Cascadia Mono", "Segoe UI Mono", monospace;
      font-size: clamp(9px, 1.9vw, 13px);
      line-height: 1.08;
      color: #4b5563;
      white-space: pre;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--card);
      padding: 14px;
      margin-bottom: 10px;
    }
    .meta {
      margin: 0 0 6px;
      font-size: 0.84rem;
      color: #6b7280;
    }
    .title {
      margin: 0;
      color: var(--fg-strong);
      font-size: 1.08rem;
      font-weight: 600;
    }
    .excerpt {
      margin: 10px 0 0;
      white-space: pre-wrap;
      font-size: 0.93rem;
      max-height: 34vh;
      overflow: auto;
      padding-right: 2px;
    }
    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 10px 0 4px;
    }
    button {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--fg);
      padding: 8px 12px;
      font-size: 0.88rem;
      cursor: pointer;
    }
    button:hover { border-color: #9ca3af; }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    .small {
      font-size: 0.78rem;
      color: #6b7280;
      margin: 8px 0 0;
    }
    a { color: #4b5563; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>おはなしの時間</h1>
    <p class="lead">おはなしを読んであげるから地層から本をひろってきなさい</p>

    <div id="strata" class="strata" aria-label="地層アスキーアート">
      <pre id="strataAscii"></pre>
    </div>

    <section class="panel">
      <p id="meta" class="meta">待機中</p>
      <h2 id="workTitle" class="title">地層を押して、おはなしをはじめる</h2>
      <div class="controls">
        <button id="readBtn" disabled>朗読する</button>
        <button id="stopBtn" disabled>停止</button>
      </div>
      <p id="excerpt" class="excerpt">ここに本文（先頭）が表示されます。</p>
      <p id="sourceInfo" class="small"></p>
    </section>
  </main>

  <script>
    const ZORAPI_URL = "https://api.bungomail.com/v0/books?limit=50";
    const ZORAPI_BOOK_DETAIL = "https://api.bungomail.com/v0/books/";
    const MAX_READ_CHARS = 2200;
    const FALLBACK_BOOKS = [
      { title: "走れメロス", author: "太宰治", year: 1940, text: "メロスは激怒した。必ず、かの邪智暴虐の王を除かなければならぬと決意した。" },
      { title: "蜘蛛の糸", author: "芥川竜之介", year: 1918, text: "ある日の事でございます。御釈迦様は極楽の蓮池のふちを、ひとりでぶらぶらお歩きになっていらっしゃいました。" },
      { title: "注文の多い料理店", author: "宮沢賢治", year: 1924, text: "二人の若い紳士が、すっかりイギリスの兵隊の形をして、ぴかぴかする鉄砲をかついで、白熊のような犬を二疋つれて、だいぶ山奥の、木の葉のかさかさしたとこ、こんなことを云いながら、あるいておりました。" },
      { title: "坊っちゃん", author: "夏目漱石", year: 1906, text: "親譲りの無鉄砲で子供の時から損ばかりしている。" },
      { title: "檸檬", author: "梶井基次郎", year: 1925, text: "えたいの知れない不吉な塊が私の心を始終圧えつけていた。" },
      { title: "舞姫", author: "森鴎外", year: 1890, text: "石炭をば早や積み果てつ。中等室の卓のほとりはいと静にて、熾熱燈の光の晴れがましきも徒なり。" },
      { title: "学問のすゝめ", author: "福沢諭吉", year: 1872, text: "天は人の上に人を造らず、人の下に人を造らずと言へり。" },
      { title: "方丈記", author: "鴨長明", year: 1212, text: "ゆく河の流れは絶えずして、しかももとの水にあらず。" },
      { title: "徒然草", author: "兼好法師", year: 1330, text: "つれづれなるままに、日ぐらし硯にむかひて、心にうつりゆくよしなしごとを、そこはかとなく書きつくれば、あやしうこそものぐるほしけれ。" }
    ];
    const LOCAL_OPENING_MAP = {
      "坊っちゃん": "親譲りの無鉄砲で子供の時から損ばかりしている。",
      "こころ": "私はその人を常に先生と呼んでいた。",
      "吾輩は猫である": "吾輩は猫である。名前はまだ無い。",
      "走れメロス": "メロスは激怒した。必ず、かの邪智暴虐の王を除かなければならぬと決意した。",
      "檸檬": "えたいの知れない不吉な塊が私の心を始終圧えつけていた。"
    };

    const strataEl = document.getElementById("strata");
    const strataAsciiEl = document.getElementById("strataAscii");
    const metaEl = document.getElementById("meta");
    const titleEl = document.getElementById("workTitle");
    const excerptEl = document.getElementById("excerpt");
    const sourceInfoEl = document.getElementById("sourceInfo");
    const readBtn = document.getElementById("readBtn");
    const stopBtn = document.getElementById("stopBtn");

    let catalogCache = null;
    let currentWork = null;
    let currentText = "";
    let isLoading = false;

    function buildAscii() {
      const rows = 38;
      const cols = 56;
      const layers = ["·", "=", "~", "-", "_", "#", "%", "@"];
      const lines = [];
      for (let y = 0; y < rows; y++) {
        const t = y / (rows - 1);
        const wave = Math.sin(y * 0.45) * 1.8 + Math.sin(y * 0.16 + 1.7);
        const idx = Math.min(layers.length - 1, Math.floor((t * layers.length) + ((wave + 2) / 8)));
        const ch = layers[idx];
        lines.push(ch.repeat(cols));
      }
      lines[0] = "┌" + "─".repeat(cols - 2) + "┐";
      lines[rows - 1] = "└" + "─".repeat(cols - 2) + "┘";
      for (let i = 1; i < rows - 1; i++) {
        lines[i] = "│" + lines[i].slice(1, cols - 1) + "│";
      }
      strataAsciiEl.textContent = lines.join("\n");
    }

    function normalizeYear(book) {
      const y1 = String(book["底本初版発行年1"] || "").match(/\d{4}/);
      if (y1) return Number(y1[0]);
      const y2 = String(book["公開日"] || "").match(/\d{4}/);
      if (y2) return Number(y2[0]);
      const born = String(book["生年月日"] || "").match(/\d{4}/);
      if (born) return Number(born[0]) + 30;
      return null;
    }

    async function fetchCatalog() {
      try {
        const res = await fetch(ZORAPI_URL, { cache: "no-store" });
        if (!res.ok) throw new Error("book api unavailable");
        const json = await res.json();
        const books = (json.books || [])
          .map((b) => {
            const year = normalizeYear(b);
            return {
              id: b["作品ID"] || "",
              title: b["作品名"] || "無題",
              author: b["姓名"] || "作者不明",
              year: year,
              htmlUrl: b["XHTML/HTMLファイルURL"] || "",
              cardUrl: b["図書カードURL"] || "",
              opening: String(b["書き出し"] || "").trim()
            };
          })
          .filter((b) => !!b.title);
        if (!books.length) throw new Error("empty catalog");
        return { books, source: "zorapi" };
      } catch {
        const books = FALLBACK_BOOKS.map((b, i) => ({
          id: `local-${i + 1}`,
          title: b.title,
          author: b.author,
          year: b.year,
          htmlUrl: "",
          cardUrl: "",
          opening: String(b.text || "").trim()
        }));
        return { books, source: "fallback" };
      }
    }

    async function getCatalog() {
      if (catalogCache) return catalogCache;
      catalogCache = await fetchCatalog();
      return catalogCache;
    }

    function depthToYearBand(depth) {
      const p = depth * 100;
      if (p < 10) return { min: -500, max: 0, label: "紀元前〜0年" };
      if (p < 20) return { min: 1, max: 1000, label: "1〜1000年" };
      if (p < 30) return { min: 1001, max: 1300, label: "1001〜1300年" };
      if (p < 40) return { min: 1301, max: 1600, label: "1301〜1600年" };
      if (p < 50) return { min: 1601, max: 1900, label: "1601〜1900年" };
      if (p < 60) return { min: 1901, max: 1915, label: "1901〜1915年" };
      if (p < 70) return { min: 1916, max: 1930, label: "1916〜1930年" };
      if (p < 80) return { min: 1931, max: 1945, label: "1931〜1945年" };
      if (p < 90) return { min: 1946, max: 1960, label: "1946〜1960年" };
      return { min: 1961, max: 2025, label: "1961年〜" };
    }

    function pickByDepth(books, depth, xRatio) {
      const withYear = books.filter((b) => Number.isFinite(b.year));
      const pool = withYear.length ? withYear : books.map((b) => ({ ...b, year: 1900 }));
      const band = depthToYearBand(depth);

      let candidates = pool.filter((b) => b.year >= band.min && b.year <= band.max);

      // 該当年代が少ない場合は段階的にレンジ拡張
      let expand = 25;
      while (candidates.length < 6 && expand <= 600) {
        candidates = pool.filter((b) => b.year >= (band.min - expand) && b.year <= (band.max + expand));
        expand += 50;
      }
      if (!candidates.length) candidates = pool;

      candidates.sort((a, b) => a.year - b.year);

      // 同じ層の中では x 座標でさらに年代を散らす（左=古い寄り、右=新しい寄り）
      const idxCenter = Math.floor((candidates.length - 1) * xRatio);
      const span = Math.max(2, Math.floor(candidates.length * 0.18));
      const lo = Math.max(0, idxCenter - span);
      const hi = Math.min(candidates.length - 1, idxCenter + span);
      const window = candidates.slice(lo, hi + 1);
      const picked = window[Math.floor(Math.random() * window.length)];
      return { picked, band };
    }

    async function fetchReadableText(book) {
      // ブラウザCORS制約で本文の直接取得が不安定なため、APIの書き出しを確実に利用する。
      if (book.opening && book.opening.length > 15) {
        return book.opening;
      }
      if (book.text && String(book.text).trim().length > 15) {
        return String(book.text).trim();
      }
      if (book.id) {
        try {
          const res = await fetch(ZORAPI_BOOK_DETAIL + encodeURIComponent(book.id), { cache: "no-store" });
          if (res.ok) {
            const json = await res.json();
            const opening = String(json?.book?.["書き出し"] || "").trim();
            if (opening.length > 15) return opening;
          }
        } catch {}
      }
      if (LOCAL_OPENING_MAP[book.title]) {
        return LOCAL_OPENING_MAP[book.title];
      }
      return `「${book.title}」の冒頭テキストを取得できませんでした。図書カードでご確認ください。`;
    }

    function stopReading() {
      speechSynthesis.cancel();
      stopBtn.disabled = true;
      readBtn.disabled = !currentText;
    }

    function startReading() {
      if (!currentText) return;
      stopReading();
      const utter = new SpeechSynthesisUtterance(currentText.slice(0, MAX_READ_CHARS));
      utter.lang = "ja-JP";
      utter.rate = 0.95;
      utter.pitch = 1.0;
      const jaVoice = speechSynthesis.getVoices().find((v) => /ja[-_]?JP/i.test(v.lang));
      if (jaVoice) utter.voice = jaVoice;
      utter.onend = () => {
        stopBtn.disabled = true;
        readBtn.disabled = false;
      };
      speechSynthesis.speak(utter);
      stopBtn.disabled = false;
      readBtn.disabled = false;
    }

    async function chooseStory(clientX, clientY) {
      if (isLoading) return;
      isLoading = true;
      readBtn.disabled = true;
      stopBtn.disabled = true;
      stopReading();

      const rect = strataEl.getBoundingClientRect();
      const x = Math.max(0, Math.min(rect.width, clientX - rect.left));
      const y = Math.max(0, Math.min(rect.height, clientY - rect.top));
      const depth = y / rect.height;
      const xRatio = x / rect.width;
      const depthForEra = 1 - depth; // 上が新しい層、下が古い層

      metaEl.textContent = `座標: x=${Math.round(x)}, y=${Math.round(y)} / depth=${depth.toFixed(2)} 読み込み中...`;

      const { books, source } = await getCatalog();
      const { picked, band } = pickByDepth(books, depthForEra, xRatio);
      const text = await fetchReadableText(picked);

      currentWork = picked;
      currentText = text;
      titleEl.textContent = `${picked.title} — ${picked.author}`;
      excerptEl.textContent = text.slice(0, 4000);
      metaEl.textContent = `層の年代帯: ${band.label} / 選択作品: ${picked.year || "不明"}年ごろ / depth=${depth.toFixed(2)} / (${Math.round(x)}, ${Math.round(y)})`;
      sourceInfoEl.innerHTML =
        source === "zorapi"
          ? `作品データ: ZORAPI（冒頭テキストを朗読）。${picked.cardUrl ? ` <a href="${picked.cardUrl}" target="_blank" rel="noreferrer">図書カード</a>` : ""}`
          : "作品データ: フォールバック内蔵リスト（API障害時モード）。";

      readBtn.disabled = false;
      isLoading = false;
    }

    strataEl.addEventListener("click", (e) => chooseStory(e.clientX, e.clientY));
    strataEl.addEventListener("touchstart", (e) => {
      const t = e.touches && e.touches[0];
      if (t) chooseStory(t.clientX, t.clientY);
    }, { passive: true });

    readBtn.addEventListener("click", startReading);
    stopBtn.addEventListener("click", stopReading);

    buildAscii();
    speechSynthesis.onvoiceschanged = () => {};
  </script>
</body>
</html>
