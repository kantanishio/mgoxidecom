<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>おはなしの時間</title>
  <style>
    :root {
      --fg: #4b5563;
      --fg-strong: #374151;
      --line: #d1d5db;
      --bg: #f9fafb;
      --card: #ffffff;
      --accent: #6b7280;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
    }
    .wrap {
      max-width: 880px;
      margin: 0 auto;
      padding: 24px 16px 56px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.6rem, 3.5vw, 2.1rem);
      color: var(--fg-strong);
      letter-spacing: 0.02em;
    }
    .lead {
      margin: 0 0 14px;
      font-size: 0.95rem;
    }
    .hint {
      margin: 0 0 14px;
      font-size: 0.82rem;
      color: #6b7280;
    }
    .strata {
      width: 100%;
      cursor: pointer;
      user-select: none;
      padding: 0;
      margin: 0 0 14px;
      overflow: auto;
      height: min(62vh, 460px);
      min-height: 300px;
    }
    .strata pre {
      margin: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, "Cascadia Mono", "Segoe UI Mono", monospace;
      font-size: clamp(9px, 1.9vw, 13px);
      line-height: 1.08;
      color: #4b5563;
      white-space: pre;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--card);
      padding: 14px;
      margin-bottom: 10px;
    }
    .meta {
      margin: 0 0 6px;
      font-size: 0.84rem;
      color: #6b7280;
    }
    .title {
      margin: 0;
      color: var(--fg-strong);
      font-size: 1.08rem;
      font-weight: 600;
    }
    .excerpt {
      margin: 10px 0 0;
      white-space: pre-wrap;
      font-size: 0.93rem;
      max-height: 34vh;
      overflow: auto;
      padding-right: 2px;
    }
    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 10px 0 4px;
    }
    button {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--fg);
      padding: 8px 12px;
      font-size: 0.88rem;
      cursor: pointer;
    }
    button:hover { border-color: #9ca3af; }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    .small {
      font-size: 0.78rem;
      color: #6b7280;
      margin: 8px 0 0;
    }
    a { color: #4b5563; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>おはなしの時間</h1>
    <p class="lead">おはなしを読んであげるから地層から本をひろってきなさい</p>

    <div id="strata" class="strata" aria-label="地層アスキーアート">
      <pre id="strataAscii"></pre>
    </div>

    <section class="panel">
      <p id="meta" class="meta">待機中</p>
      <h2 id="workTitle" class="title">地層を押して、おはなしをはじめる</h2>
      <div class="controls">
        <button id="readBtn" disabled>朗読する</button>
        <button id="stopBtn" disabled>停止</button>
      </div>
      <p id="excerpt" class="excerpt">ここに本文（先頭）が表示されます。</p>
      <p id="sourceInfo" class="small"></p>
    </section>
  </main>

  <script src="./data/aozora-catalog.js"></script>
  <script>
    const CATALOG_URL = "/kan-tools/data/aozora-catalog.json";
    const AOZORA_CDN_PREFIX = "https://cdn.jsdelivr.net/gh/aozorabunko/aozorabunko/";
    const MAX_VISIBLE_CHARS = 14000;
    const SPEECH_CHUNK_LEN = 170;

    const FALLBACK_BOOKS = [
      { id: "local-1", title: "走れメロス", author: "太宰治", year: 1940, cardUrl: "", htmlUrl: "", text: "メロスは激怒した。必ず、かの邪智暴虐の王を除かなければならぬと決意した。" },
      { id: "local-2", title: "坊っちゃん", author: "夏目漱石", year: 1906, cardUrl: "", htmlUrl: "", text: "親譲りの無鉄砲で子供の時から損ばかりしている。" },
      { id: "local-3", title: "学問のすゝめ", author: "福沢諭吉", year: 1872, cardUrl: "", htmlUrl: "", text: "天は人の上に人を造らず、人の下に人を造らずと言へり。" }
    ];

    const strataEl = document.getElementById("strata");
    const strataAsciiEl = document.getElementById("strataAscii");
    const metaEl = document.getElementById("meta");
    const titleEl = document.getElementById("workTitle");
    const excerptEl = document.getElementById("excerpt");
    const sourceInfoEl = document.getElementById("sourceInfo");
    const readBtn = document.getElementById("readBtn");
    const stopBtn = document.getElementById("stopBtn");

    let catalogCache = null;
    let currentWork = null;
    let currentText = "";
    let isLoading = false;
    let speaking = false;
    let speechQueue = [];

    function buildAscii() {
      const rows = 38;
      const cols = 56;
      const layers = ["·", "=", "~", "-", "_", "#", "%", "@"];
      const lines = [];
      for (let y = 0; y < rows; y++) {
        const t = y / (rows - 1);
        const wave = Math.sin(y * 0.45) * 1.8 + Math.sin(y * 0.16 + 1.7);
        const idx = Math.min(layers.length - 1, Math.floor((t * layers.length) + ((wave + 2) / 8)));
        const ch = layers[idx];
        lines.push(ch.repeat(cols));
      }
      lines[0] = "┌" + "─".repeat(cols - 2) + "┐";
      lines[rows - 1] = "└" + "─".repeat(cols - 2) + "┘";
      for (let i = 1; i < rows - 1; i++) {
        lines[i] = "│" + lines[i].slice(1, cols - 1) + "│";
      }
      strataAsciiEl.textContent = lines.join("\n");
    }

    async function fetchCatalog() {
      if (Array.isArray(window.__AOZORA_CATALOG__) && window.__AOZORA_CATALOG__.length) {
        return { books: window.__AOZORA_CATALOG__, source: "catalog-js" };
      }
      try {
        const res = await fetch(CATALOG_URL, { cache: "force-cache" });
        if (!res.ok) throw new Error("catalog unavailable");
        const books = await res.json();
        if (!Array.isArray(books) || !books.length) throw new Error("empty catalog");
        return { books, source: "catalog-json" };
      } catch {
        return { books: FALLBACK_BOOKS, source: "fallback" };
      }
    }

    async function getCatalog() {
      if (catalogCache) return catalogCache;
      catalogCache = await fetchCatalog();
      return catalogCache;
    }

    function depthToYearBand(depth) {
      const p = depth * 100;
      if (p < 12) return { min: 1001, max: 1300, label: "1001〜1300年" };
      if (p < 24) return { min: 1301, max: 1600, label: "1301〜1600年" };
      if (p < 36) return { min: 1601, max: 1800, label: "1601〜1800年" };
      if (p < 48) return { min: 1801, max: 1900, label: "1801〜1900年" };
      if (p < 62) return { min: 1901, max: 1915, label: "1901〜1915年" };
      if (p < 76) return { min: 1916, max: 1930, label: "1916〜1930年" };
      if (p < 88) return { min: 1931, max: 1945, label: "1931〜1945年" };
      if (p < 95) return { min: 1946, max: 1960, label: "1946〜1960年" };
      return { min: 1961, max: 2025, label: "1961年〜" };
    }

    function pickByDepth(books, depth, xRatio) {
      const withYear = books.filter((b) => Number.isFinite(b.year));
      const pool = withYear.length ? withYear : books.map((b) => ({ ...b, year: 1900 }));
      const band = depthToYearBand(depth);

      const candidates = pool.filter((b) => b.year >= band.min && b.year <= band.max);
      if (!candidates.length) {
        return { picked: null, band, poolSize: 0 };
      }

      candidates.sort((a, b) => (a.year || 0) - (b.year || 0));
      const idxCenter = Math.floor((candidates.length - 1) * xRatio);
      const span = Math.max(10, Math.floor(candidates.length * 0.22));
      const lo = Math.max(0, idxCenter - span);
      const hi = Math.min(candidates.length - 1, idxCenter + span);
      const window = candidates.slice(lo, hi + 1);
      const picked = window[Math.floor(Math.random() * window.length)] || candidates[Math.floor(Math.random() * candidates.length)];
      return { picked, band, poolSize: candidates.length };
    }

    function toCdnHtmlUrl(htmlUrl) {
      if (!htmlUrl) return "";
      return htmlUrl
        .replace(/^https?:\/\/www\.aozora\.gr\.jp\//, AOZORA_CDN_PREFIX)
        .replace(/^https?:\/\/aozora\.gr\.jp\//, AOZORA_CDN_PREFIX);
    }

    function htmlToReadableText(html) {
      const doc = new DOMParser().parseFromString(html, "text/html");
      doc.querySelectorAll("script,style,rt,rp").forEach((n) => n.remove());
      const body = doc.querySelector(".main_text") || doc.body;
      if (!body) return "";
      return body.textContent
        .replace(/\r/g, "")
        .replace(/[ \t]+\n/g, "\n")
        .replace(/\n{3,}/g, "\n\n")
        .trim();
    }

    function scoreDecodedText(s) {
      if (!s) return -1e9;
      const rep = (s.match(/�/g) || []).length;
      const jp = (s.match(/[一-龠ぁ-んァ-ン]/g) || []).length;
      const ascii = (s.match(/[A-Za-z0-9]/g) || []).length;
      return jp * 2 + ascii * 0.1 - rep * 25;
    }

    function decodeHtmlBuffer(buf) {
      let utf8 = "";
      let sjis = "";
      try { utf8 = new TextDecoder("utf-8").decode(buf); } catch {}
      try { sjis = new TextDecoder("shift_jis").decode(buf); } catch {}
      return scoreDecodedText(sjis) > scoreDecodedText(utf8) ? sjis : utf8;
    }

    async function fetchReadableText(book) {
      if (book.text && String(book.text).trim().length > 15) {
        return String(book.text).trim();
      }
      const cdnUrl = toCdnHtmlUrl(book.htmlUrl);
      if (!cdnUrl) {
        return `「${book.title}」の本文URLを取得できませんでした。`;
      }
      const res = await fetch(cdnUrl, { cache: "force-cache" });
      if (!res.ok) throw new Error("html fetch failed");
      const htmlBuf = await res.arrayBuffer();
      const html = decodeHtmlBuffer(htmlBuf);
      const text = htmlToReadableText(html);
      if (!text || text.length < 40) throw new Error("parsed text too short");
      return text;
    }

    function splitForSpeech(text) {
      const chunks = [];
      let buf = "";
      const parts = text.split(/(?<=[。！？\n])/);
      for (const part of parts) {
        const p = part.trim();
        if (!p) continue;
        if ((buf + p).length > SPEECH_CHUNK_LEN && buf) {
          chunks.push(buf);
          buf = p;
        } else {
          buf += p;
        }
      }
      if (buf) chunks.push(buf);
      return chunks.length ? chunks : [text.slice(0, SPEECH_CHUNK_LEN)];
    }

    function pickPreferredJaVoice() {
      const voices = speechSynthesis.getVoices() || [];
      const ja = voices.filter((v) => /ja[-_]?JP/i.test(v.lang));
      if (!ja.length) return null;
      const preferredName = ["Kyoko", "Otoya", "Siri", "Japanese", "Japan"];
      for (const key of preferredName) {
        const v = ja.find((voice) => (voice.name || "").includes(key));
        if (v) return v;
      }
      return ja[0];
    }

    function stopReading() {
      speaking = false;
      speechQueue = [];
      speechSynthesis.cancel();
      stopBtn.disabled = true;
      readBtn.disabled = !currentText;
    }

    function speakNextChunk() {
      if (!speaking || !speechQueue.length) {
        speaking = false;
        stopBtn.disabled = true;
        readBtn.disabled = !currentText;
        return;
      }
      const text = speechQueue.shift();
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = "ja-JP";
      utter.rate = 0.9;
      utter.pitch = 1.0;
      const jaVoice = pickPreferredJaVoice();
      if (jaVoice) utter.voice = jaVoice;
      utter.onend = () => speakNextChunk();
      utter.onerror = () => speakNextChunk();
      speechSynthesis.speak(utter);
    }

    function startReading() {
      if (!currentText) return;
      stopReading();
      const head = currentWork
        ? `『${currentWork.title}』。作者、${currentWork.author}。`
        : "";
      speechQueue = splitForSpeech(`${head}\n${currentText}`);
      speaking = true;
      stopBtn.disabled = false;
      readBtn.disabled = false;
      speakNextChunk();
    }

    async function chooseStory(clientX, clientY) {
      if (isLoading) return;
      isLoading = true;
      readBtn.disabled = true;
      stopBtn.disabled = true;
      stopReading();

      try {
        const rect = strataEl.getBoundingClientRect();
        const x = Math.max(0, Math.min(rect.width, clientX - rect.left));
        const y = Math.max(0, Math.min(rect.height, clientY - rect.top));
        const depth = y / rect.height;
        const xRatio = x / rect.width;
        const depthForEra = 1 - depth; // 上が新しい層、下が古い層

        metaEl.textContent = `座標: x=${Math.round(x)}, y=${Math.round(y)} / depth=${depth.toFixed(2)} 読み込み中...`;

        const { books, source } = await getCatalog();
        const { picked, band, poolSize } = pickByDepth(books, depthForEra, xRatio);
        if (!picked) {
          currentWork = null;
          currentText = "";
          titleEl.textContent = "この層の候補がありません";
          excerptEl.textContent = "別の高さの地層を押してみてください。";
          metaEl.textContent = `層の年代帯: ${band.label} / 候補: 0件`;
          sourceInfoEl.innerHTML = `作品母集団: 全${books.length.toLocaleString()}件`;
          return;
        }
        const text = await fetchReadableText(picked);

        currentWork = picked;
        currentText = text;
        titleEl.textContent = `${picked.title} — ${picked.author}`;
        excerptEl.textContent = text.slice(0, MAX_VISIBLE_CHARS);
        metaEl.textContent = `層の年代帯: ${band.label} / 選択作品: ${picked.year || "不明"}年ごろ / depth=${depth.toFixed(2)} / (${Math.round(x)}, ${Math.round(y)})`;
        sourceInfoEl.innerHTML =
          source === "catalog-json" || source === "catalog-js"
            ? `作品母集団: 全${books.length.toLocaleString()}件（この層の候補 ${poolSize.toLocaleString()}件）${picked.cardUrl ? ` / <a href="${picked.cardUrl}" target="_blank" rel="noreferrer">図書カード</a>` : ""}`
            : "作品母集団: フォールバック（通信不調時）";
      } catch (err) {
        currentText = "";
        titleEl.textContent = "本文取得に失敗しました";
        excerptEl.textContent = "もう一度地層を押して選び直してください。";
        metaEl.textContent = `読み込みエラー: ${String(err && err.message ? err.message : err)}`;
      } finally {
        readBtn.disabled = !currentText;
        stopBtn.disabled = true;
        isLoading = false;
      }
    }

    strataEl.addEventListener("click", (e) => chooseStory(e.clientX, e.clientY));
    strataEl.addEventListener("touchstart", (e) => {
      const t = e.touches && e.touches[0];
      if (t) chooseStory(t.clientX, t.clientY);
    }, { passive: true });

    readBtn.addEventListener("click", startReading);
    stopBtn.addEventListener("click", stopReading);

    buildAscii();
    speechSynthesis.onvoiceschanged = () => {};
  </script>
</body>
</html>
